<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>妈妈的电话 | 母亲节</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; background: #1a1a1a; color: #fff; }
        .container { max-width: 414px; margin: 0 auto; background: #1a1a1a; padding-bottom: 20px; }
        
        .cover { padding: 40px 20px; text-align: center; }
        .cover-img { width: 100%; height: 200px; object-fit: cover; border-radius: 16px; margin-bottom: 20px; }
        .cover h1 { font-size: 24px; font-weight: 700; margin-bottom: 10px; color: #fff; }
        .cover .subtitle { font-size: 15px; opacity: 0.8; }
        
        .card { background: #2a2a2a; margin: 12px 16px; border-radius: 12px; overflow: hidden; }
        .card-img { width: 100%; height: 160px; object-fit: cover; }
        .card-content { padding: 18px; }
        .card-content h3 { font-size: 16px; color: #fff; margin-bottom: 10px; font-weight: 600; }
        .card-content p { font-size: 14px; color: #bbb; line-height: 1.8; }
        
        .tags { padding: 15px 16px; display: flex; flex-wrap: wrap; gap: 8px; }
        .tag { background: #333; color: #ff6b6b; padding: 6px 14px; border-radius: 20px; font-size: 13px; }
        
        .brand { text-align: center; padding: 20px; color: #666; font-size: 13px; }
        .brand-logo { width: 40px; height: 40px; border-radius: 50%; margin-bottom: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="cover">
            <img src="小南国1.jpg" alt="小南国" class="cover-img">
            <h1>📞 妈妈的电话</h1>
            <div class="subtitle">你多久没接了？</div>
        </div>
        
        <div class="card">
            <img src="小南国2.jpg" alt="小南国" class="card-img">
            <div class="card-content">
                <h3>早上8点</h3>
                <p>你在睡觉</p>
                <p>"妈，我在忙，晚点打给你"</p>
            </div>
        </div>
        
        <div class="card">
            <img src="小南国3.jpg" alt="小南国" class="card-img">
            <div class="card-content">
                <h3>中午12点</h3>
                <p>你在开会</p>
                <p>下午...晚上...明天...</p>
            </div>
        </div>
        
        <div class="card">
            <img src="小南国4.jpg" alt="小南国" class="card-img">
            <div class="card-content">
                <h3>一周后</h3>
                <p>"妈，最近太忙了"</p>
                <p>"没什么事我先挂了"</p>
            </div>
        </div>
        
        <div class="card">
            <img src="小南国5.jpg" alt="小南国" class="card-img">
            <div class="card-content">
                <h3>💔 其实她只想听听</h3>
                <p>你的声音</p>
                <p>确认你还好好的</p>
            </div>
        </div>
        
        <div class="card">
            <img src="小南国6.jpg" alt="小南国" class="card-img">
            <div class="card-content">
                <h3>📍 母亲节 · 小南国</h3>
                <p>388元家庭套餐 🌸</p>
                <p>陪她吃顿饭，好好聊聊</p>
            </div>
        </div>
        
        <div class="tags">
            <span class="tag">#母亲节</span>
            <span class="tag">#妈妈的电话</span>
            <span class="tag">#别让等待成为遗憾</span>
            <span class="tag">#母亲节餐厅</span>
            <span class="tag">#小南国</span>
            <span class="tag">#深圳美食</span>
        </div>
        
        <div class="brand">
            <img src="青木会江湖_logo_108x108.png" alt="logo" class="brand-logo">
            <p>📞 青木会江湖</p>
        </div>
    </div>
</body>
</html>
