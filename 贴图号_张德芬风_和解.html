<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>张德芬风_与妈妈和解_贴图号</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; background: #f5f5f5; }
        .container { max-width: 414px; margin: 0 auto; background: #fff; padding-bottom: 30px; }
        .card { position: relative; width: 100%; }
        .card img { width: 100%; display: block; }
        .card-text { position: absolute; bottom: 0; left: 0; right: 0; padding: 30px 20px 25px; background: linear-gradient(transparent, rgba(0,0,0,0.8)); color: white; }
        .card-text h3 { font-size: 18px; font-weight: 600; margin-bottom: 5px; line-height: 1.4; }
        .card-text p { font-size: 14px; opacity: 0.9; line-height: 1.6; }
        .logo { position: fixed; bottom: 20px; right: 20px; width: 50px; height: 50px; background: white; border-radius: 50%; box-shadow: 0 4px 15px rgba(0,0,0,0.15); display: flex; align-items: center; justify-content: center; z-index: 100; }
        .logo img { width: 40px; height: 40px; border-radius: 50%; }
        .watermark { text-align: center; padding: 15px; color: #ccc; font-size: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <!-- 第1张 -->
        <div class="card">
            <img src="小南国1.jpg" alt="小南国">
            <div class="card-text">
                <h3>与妈妈的和解<br>从一顿饭开始</h3>
            </div>
        </div>
        
        <!-- 第2张 -->
        <div class="card">
            <img src="小南国2.jpg" alt="小南国">
            <div class="card-text">
                <h3>💫 内在小孩的疗愈</h3>
                <p>每个女人心里<br>都住着一个小女孩</p>
            </div>
        </div>
        
        <!-- 第3张 -->
        <div class="card">
            <img src="小南国3.jpg" alt="小南国">
            <div class="card-text">
                <h3>妈妈也是第一次当妈妈</h3>
                <p>她也有她的局限<br>她的伤痕</p>
            </div>
        </div>
        
        <!-- 第4张 -->
        <div class="card">
            <img src="小南国4.jpg" alt="小南国">
            <div class="card-text">
                <h3>和解</h3>
                <p>不是为了她<br>是为了你自己 💖</p>
            </div>
        </div>
        
        <!-- 第5张 -->
        <div class="card">
            <img src="小南国5.jpg" alt="小南国">
            <div class="card-text">
                <h3>📍 小南国</h3>
                <p>388元感恩套餐<br>让爱有处安放</p>
            </div>
        </div>
        
        <div class="watermark">💖 青木会江湖</div>
    </div>
    
    <div class="logo">
        <img src="青木会江湖_logo_108x108.png" alt="logo">
    </div>
</body>
</html>
