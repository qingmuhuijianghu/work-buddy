<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贴图号_妈妈的电话.html</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; background: #1a1a1a; }
        .container { max-width: 414px; margin: 0 auto; background: #1a1a1a; }
        .card { position: relative; width: 100%; }
        .card img { width: 100%; display: block; }
        .card-text { position: absolute; bottom: 0; left: 0; right: 0; padding: 25px 18px 20px; background: linear-gradient(transparent, rgba(0,0,0,0.85)); color: white; text-align: center; }
        .card-text h3 { font-size: 16px; font-weight: 600; margin-bottom: 4px; line-height: 1.5; }
        .card-text p { font-size: 13px; opacity: 0.9; line-height: 1.5; }
        .call { font-size: 40px; text-align: center; padding: 30px; }
        .logo { position: fixed; bottom: 15px; right: 15px; width: 45px; height: 45px; background: white; border-radius: 50%; box-shadow: 0 3px 10px rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: center; z-index: 100; }
        .logo img { width: 35px; height: 35px; border-radius: 50%; }
        .watermark { text-align: center; padding: 12px; color: #666; font-size: 11px; }
    </style>
</head>
<body>
    <div class="container">
        <!-- 第1张 -->
        <div class="card">
            <img src="小南国1.jpg" alt="小南国">
            <div class="card-text">
                <h3>📱 妈妈的电话</h3>
                <p>你多久没接了？</p>
            </div>
        </div>
        
        <!-- 第2张 -->
        <div class="card">
            <img src="小南国2.jpg" alt="小南国">
            <div class="card-text">
                <h3>早上8点</h3>
                <p>你在睡觉<br>"妈，我在忙，晚点打给你"</p>
            </div>
        </div>
        
        <!-- 第3张 -->
        <div class="card">
            <img src="小南国3.jpg" alt="小南国">
            <div class="card-text">
                <h3>中午12点</h3>
                <p>你在开会<br>下午...晚上...明天...</p>
            </div>
        </div>
        
        <!-- 第4张 -->
        <div class="card">
            <img src="小南国4.jpg" alt="小南国">
            <div class="card-text">
                <h3>一周后</h3>
                <p>"妈，最近太忙了<br>没什么事我先挂了"</p>
            </div>
        </div>
        
        <!-- 第5张 -->
        <div class="card">
            <img src="小南国5.jpg" alt="小南国">
            <div class="card-text">
                <h3>其实她只想听听</h3>
                <p>你的声音<br>确认你还好好的</p>
            </div>
        </div>
        
        <!-- 第6张 -->
        <div class="card">
            <img src="小南国6.jpg" alt="小南国">
            <div class="card-text">
                <h3>📍 母亲节 · 小南国</h3>
                <p>388元套餐<br>陪她吃顿饭，好好聊聊 🌸</p>
            </div>
        </div>
        
        <div class="watermark">📞 青木会江湖</div>
    </div>
    
    <div class="logo">
        <img src="青木会江湖_logo_108x108.png" alt="logo">
    </div>
</body>
</html>
