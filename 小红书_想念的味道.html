<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>想念妈妈的味道 | 母亲节</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; background: #f5f5f5; }
        .container { max-width: 414px; margin: 0 auto; background: #fff; padding-bottom: 20px; }
        
        .cover { background: linear-gradient(135deg, #f093fb, #f5576c); padding: 40px 20px; text-align: center; color: white; }
        .cover-img { width: 100%; height: 180px; object-fit: cover; border-radius: 12px; margin-bottom: 20px; }
        .cover h1 { font-size: 22px; font-weight: 700; margin-bottom: 8px; line-height: 1.4; }
        .cover .subtitle { font-size: 14px; opacity: 0.9; }
        
        .card { background: white; margin: 12px 16px; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .card-img { width: 100%; height: 160px; object-fit: cover; }
        .card-content { padding: 16px; }
        .card-content h3 { font-size: 16px; color: #333; margin-bottom: 8px; font-weight: 600; }
        .card-content p { font-size: 14px; color: #666; line-height: 1.7; }
        
        .tags { padding: 15px 16px; display: flex; flex-wrap: wrap; gap: 8px; }
        .tag { background: #fff0f8; color: #f5576c; padding: 6px 14px; border-radius: 20px; font-size: 13px; }
        
        .brand { text-align: center; padding: 20px; color: #999; font-size: 13px; }
        .brand-logo { width: 40px; height: 40px; border-radius: 50%; margin-bottom: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="cover">
            <img src="小南国1.jpg" alt="小南国" class="cover-img">
            <h1>在外漂泊第5年</h1>
            <div class="subtitle">最想念的，是妈妈那碗手擀面</div>
        </div>
        
        <div class="card">
            <img src="小南国2.jpg" alt="小南国" class="card-img">
            <div class="card-content">
                <h3>🍜 妈妈的招牌手擀面</h3>
                <p>面有点硬，卤有点咸。</p>
                <p>但就是忘不掉。</p>
            </div>
        </div>
        
        <div class="card">
            <img src="小南国3.jpg" alt="小南国" class="card-img">
            <div class="card-content">
                <h3>🏠 后来才知道</h3>
                <p>那不叫"手擀面"。</p>
                <p>那叫"家的味道"。</p>
            </div>
        </div>
        
        <div class="card">
            <img src="小南国4.jpg" alt="小南国" class="card-img">
            <div class="card-content">
                <h3>📞 妈妈每次打电话</h3>
                <p>"吃了吗？吃的啥？</p>
                <p>有没有喝汤？"</p>
            </div>
        </div>
        
        <div class="card">
            <img src="小南国5.jpg" alt="小南国" class="card-img">
            <div class="card-content">
                <h3>💭 以前觉得烦</h3>
                <p>现在才懂——</p>
                <p>这是她表达爱的方式。</p>
            </div>
        </div>
        
        <div class="card">
            <img src="小南国6.jpg" alt="小南国" class="card-img">
            <div class="card-content">
                <h3>📍 母亲节 · 小南国</h3>
                <p>388元家庭套餐 🍽️</p>
                <p>带妈妈吃顿好的</p>
            </div>
        </div>
        
        <div class="tags">
            <span class="tag">#母亲节</span>
            <span class="tag">#家的味道</span>
            <span class="tag">#想家了</span>
            <span class="tag">#妈妈的味道</span>
            <span class="tag">#小南国</span>
            <span class="tag">#深圳美食</span>
        </div>
        
        <div class="brand">
            <img src="青木会江湖_logo_108x108.png" alt="logo" class="brand-logo">
            <p>🏠 青木会江湖</p>
        </div>
    </div>
</body>
</html>
