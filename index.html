<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小南国母亲节推文合集</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #fff5f8 0%, #ffeef5 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container {
            max-width: 640px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        .header h1 {
            font-size: 28px;
            color: #d63384;
            margin-bottom: 8px;
        }
        .header p {
            color: #888;
            font-size: 14px;
        }
        .card {
            background: #fff;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(214, 51, 132, 0.1);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 30px rgba(214, 51, 132, 0.15);
        }
        .card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        .card-num {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #d63384, #ff6b9d);
            color: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 16px;
        }
        .card-title {
            font-size: 18px;
            font-weight: 700;
            color: #333;
        }
        .card-desc {
            color: #666;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 16px;
        }
        .card-tag {
            display: inline-block;
            background: #fff5f8;
            color: #d63384;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            margin-right: 8px;
        }
        .card-link {
            display: block;
            background: linear-gradient(135deg, #d63384 0%, #ff6b9d 100%);
            color: #fff;
            text-align: center;
            padding: 14px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            margin-top: 16px;
        }
        .footer {
            text-align: center;
            margin-top: 40px;
            color: #999;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌸 小南国母亲节推文</h1>
            <p>上海小南国（珠海富华里店）· 母亲节特别企划</p>
        </div>

        <div class="card">
            <div class="card-header">
                <div class="card-num">1</div>
                <div class="card-title">带妈妈吃顿有仪式感的饭</div>
            </div>
            <div class="card-desc">
                从"随便都行"的日常对话开场，直击带妈妈吃饭的痛点，用粉色主题布置和零套路承诺打动客户。
            </div>
            <span class="card-tag">情感共鸣</span>
            <span class="card-tag">痛点解决</span>
            <a href="./小南国_推文1_仪式感.html" class="card-link">查看推文 →</a>
        </div>

        <div class="card">
            <div class="card-header">
                <div class="card-num">2</div>
                <div class="card-title">妈妈的厨房，味蕾记忆</div>
            </div>
            <div class="card-desc">
                用"好吃就多做"的温情回忆杀，唤起对妈妈厨艺的记忆，用情感故事打动读者。
            </div>
            <span class="card-tag">温情回忆</span>
            <span class="card-tag">故事驱动</span>
            <a href="./小南国_推文2_味蕾记忆.html" class="card-link">查看推文 →</a>
        </div>

        <div class="card">
            <div class="card-header">
                <div class="card-num">3</div>
                <div class="card-title">选餐厅的5条标准</div>
            </div>
            <div class="card-desc">
                理性清单式内容，用5条标准逐一对比，适合务实派和选择困难症客户。
            </div>
            <span class="card-tag">理性决策</span>
            <span class="card-tag">清单式</span>
            <a href="./小南国_推文3_选餐厅标准.html" class="card-link">查看推文 →</a>
        </div>

        <div class="footer">
            <p>WorkBuddy 生成 · 2026年母亲节</p>
        </div>
    </div>
</body>
</html>
