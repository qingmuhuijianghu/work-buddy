<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贴图号_妈妈爱吃鱼头.html</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; background: #fafafa; }
        .container { max-width: 414px; margin: 0 auto; background: #fff; }
        .card { position: relative; width: 100%; }
        .card img { width: 100%; display: block; }
        .card-text { position: absolute; bottom: 0; left: 0; right: 0; padding: 25px 18px 20px; background: linear-gradient(transparent, rgba(0,0,0,0.8)); color: white; }
        .card-text h3 { font-size: 16px; font-weight: 600; margin-bottom: 4px; line-height: 1.4; }
        .card-text p { font-size: 13px; opacity: 0.9; line-height: 1.5; }
        .logo { position: fixed; bottom: 15px; right: 15px; width: 45px; height: 45px; background: white; border-radius: 50%; box-shadow: 0 3px 10px rgba(0,0,0,0.2); display: flex; align-items: center; justify-content: center; z-index: 100; }
        .logo img { width: 35px; height: 35px; border-radius: 50%; }
        .watermark { text-align: center; padding: 12px; color: #ccc; font-size: 11px; }
    </style>
</head>
<body>
    <div class="container">
        <!-- 第1张 -->
        <div class="card">
            <img src="小南国1.jpg" alt="小南国">
            <div class="card-text">
                <h3>妈妈说：我不爱吃鱼头</h3>
                <p>你信了多少年？</p>
            </div>
        </div>
        
        <!-- 第2张 -->
        <div class="card">
            <img src="小南国2.jpg" alt="小南国">
            <div class="card-text">
                <h3>每次吃鱼</h3>
                <p>她都把鱼脸肉夹给你<br>说：我吃鱼头就行</p>
            </div>
        </div>
        
        <!-- 第3张 -->
        <div class="card">
            <img src="小南国3.jpg" alt="小南国">
            <div class="card-text">
                <h3>后来我长大了</h3>
                <p>才发现<br>她不是不爱吃</p>
            </div>
        </div>
        
        <!-- 第4张 -->
        <div class="card">
            <img src="小南国4.jpg" alt="小南国">
            <div class="card-text">
                <h3>她只是想<br>让你吃好一点</h3>
                <p>这招叫"爱的谎言"</p>
            </div>
        </div>
        
        <!-- 第5张 -->
        <div class="card">
            <img src="小南国5.jpg" alt="小南国">
            <div class="card-text">
                <h3>今年母亲节</h3>
                <p>把鱼脸肉夹给她<br>说：妈，这个给你</p>
            </div>
        </div>
        
        <!-- 第6张 -->
        <div class="card">
            <img src="小南国6.jpg" alt="小南国">
            <div class="card-text">
                <h3>📍 小南国 · 母亲节套餐</h3>
                <p>388元家庭套餐 🌸<br>到店妈妈送康乃馨</p>
            </div>
        </div>
        
        <div class="watermark">🍽️ 青木会江湖</div>
    </div>
    
    <div class="logo">
        <img src="青木会江湖_logo_108x108.png" alt="logo">
    </div>
</body>
</html>
