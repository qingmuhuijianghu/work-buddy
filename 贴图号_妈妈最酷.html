<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贴图号_妈妈最酷.html</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; background: #f5f5f5; }
        .container { max-width: 414px; margin: 0 auto; background: #fff; }
        .card { position: relative; width: 100%; }
        .card img { width: 100%; display: block; }
        .card-text { position: absolute; bottom: 0; left: 0; right: 0; padding: 25px 18px 20px; background: linear-gradient(transparent, rgba(0,0,0,0.75)); color: white; }
        .card-text h3 { font-size: 16px; font-weight: 600; margin-bottom: 4px; line-height: 1.4; }
        .card-text p { font-size: 13px; opacity: 0.9; line-height: 1.5; }
        .big { font-size: 24px; text-align: center; padding: 20px; }
        .logo { position: fixed; bottom: 15px; right: 15px; width: 45px; height: 45px; background: white; border-radius: 50%; box-shadow: 0 3px 10px rgba(0,0,0,0.2); display: flex; align-items: center; justify-content: center; z-index: 100; }
        .logo img { width: 35px; height: 35px; border-radius: 50%; }
        .watermark { text-align: center; padding: 12px; color: #ccc; font-size: 11px; }
    </style>
</head>
<body>
    <div class="container">
        <!-- 第1张 -->
        <div class="card">
            <img src="小南国1.jpg" alt="小南国">
            <div class="card-text">
                <h3>我妈当年</h3>
                <p>也是个小姑娘</p>
            </div>
        </div>
        
        <!-- 第2张 -->
        <div class="card">
            <img src="小南国2.jpg" alt="小南国">
            <div class="card-text">
                <h3>她也有<br>自己的梦想</h3>
                <p>想当老师<br>想去看看世界</p>
            </div>
        </div>
        
        <!-- 第3张 -->
        <div class="card">
            <img src="小南国3.jpg" alt="小南国">
            <div class="card-text">
                <h3>后来有了你</h3>
                <p>她把梦想收起来<br>把生活扛在肩上</p>
            </div>
        </div>
        
        <!-- 第4张 -->
        <div class="card">
            <img src="小南国4.jpg" alt="小南国">
            <div class="card-text">
                <h3>她变老了</h3>
                <p>但她是最酷的女人<br>因为她选择了爱你</p>
            </div>
        </div>
        
        <!-- 第5张 -->
        <div class="card">
            <img src="小南国5.jpg" alt="小南国">
            <div class="card-text">
                <h3>所以母亲节</h3>
                <p>别只发朋友圈<br>打个电话吧 📞</p>
            </div>
        </div>
        
        <!-- 第6张 -->
        <div class="card">
            <img src="小南国6.jpg" alt="小南国">
            <div class="card-text">
                <h3>📍 小南国 · 母亲节</h3>
                <p>388元套餐 🌸<br>带她吃顿好的</p>
            </div>
        </div>
        
        <div class="watermark">👑 青木会江湖</div>
    </div>
    
    <div class="logo">
        <img src="青木会江湖_logo_108x108.png" alt="logo">
    </div>
</body>
</html>
