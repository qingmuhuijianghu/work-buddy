<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>李诞风_妈妈的谎言_贴图号</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; background: #f0f0f0; }
        .container { max-width: 414px; margin: 0 auto; background: #fff; padding-bottom: 30px; }
        .card { position: relative; width: 100%; }
        .card img { width: 100%; display: block; }
        .card-text { position: absolute; bottom: 0; left: 0; right: 0; padding: 25px 20px 20px; background: linear-gradient(transparent, rgba(0,0,0,0.8)); color: white; }
        .lie { background: white; color: #333; padding: 15px 20px; text-align: center; border-radius: 10px; margin: 15px; text-decoration: line-through; opacity: 0.7; }
        .truth { background: white; color: #e74c3c; padding: 15px 20px; text-align: center; border-radius: 10px; margin: 10px 15px; font-weight: 600; }
        .card-text h3 { font-size: 18px; font-weight: 600; margin-bottom: 5px; line-height: 1.4; }
        .card-text p { font-size: 14px; opacity: 0.9; line-height: 1.6; }
        .logo { position: fixed; bottom: 20px; right: 20px; width: 50px; height: 50px; background: white; border-radius: 50%; box-shadow: 0 4px 15px rgba(0,0,0,0.15); display: flex; align-items: center; justify-content: center; z-index: 100; }
        .logo img { width: 40px; height: 40px; border-radius: 50%; }
        .watermark { text-align: center; padding: 15px; color: #ccc; font-size: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <!-- 第1张 -->
        <div class="card">
            <img src="小南国1.jpg" alt="小南国">
            <div class="card-text">
                <h3>😏 妈妈的"谎言"</h3>
                <p>我替她拆了</p>
            </div>
        </div>
        
        <!-- 第2张 -->
        <div class="card">
            <img src="小南国2.jpg" alt="小南国">
            <div class="card-text">
                <h3>"我不爱吃，你吃吧"</h3>
                <p>——其实她只是<br>想让你多吃点</p>
            </div>
        </div>
        
        <!-- 第3张 -->
        <div class="card">
            <img src="小南国3.jpg" alt="小南国">
            <div class="card-text">
                <h3>"不用回来，我挺好的"</h3>
                <p>——其实她每天晚上<br>都在看你发的朋友圈</p>
            </div>
        </div>
        
        <!-- 第4张 -->
        <div class="card">
            <img src="小南国4.jpg" alt="小南国">
            <div class="card-text">
                <h3>这个母亲节</h3>
                <p>不配合她演了<br>直接带她去吃 💪</p>
            </div>
        </div>
        
        <!-- 第5张 -->
        <div class="card">
            <img src="小南国5.jpg" alt="小南国">
            <div class="card-text">
                <h3>📍 小南国</h3>
                <p>388元家庭套餐<br>5月10日 等你们 🌸</p>
            </div>
        </div>
        
        <div class="watermark">😏 青木会江湖</div>
    </div>
    
    <div class="logo">
        <img src="青木会江湖_logo_108x108.png" alt="logo">
    </div>
</body>
</html>
