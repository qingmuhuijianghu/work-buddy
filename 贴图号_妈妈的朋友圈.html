<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贴图号_妈妈的朋友圈.html</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; background: #f0f0f0; }
        .container { max-width: 414px; margin: 0 auto; background: #fff; }
        .card { position: relative; width: 100%; }
        .card img { width: 100%; display: block; }
        .card-text { position: absolute; bottom: 0; left: 0; right: 0; padding: 25px 18px 20px; background: linear-gradient(transparent, rgba(0,0,0,0.8)); color: white; }
        .card-text h3 { font-size: 16px; font-weight: 600; margin-bottom: 4px; line-height: 1.4; }
        .card-text p { font-size: 13px; opacity: 0.9; line-height: 1.5; }
        .chat { background: #fff3cd; color: #333; padding: 15px; margin: 10px; border-radius: 10px; font-size: 13px; }
        .logo { position: fixed; bottom: 15px; right: 15px; width: 45px; height: 45px; background: white; border-radius: 50%; box-shadow: 0 3px 10px rgba(0,0,0,0.2); display: flex; align-items: center; justify-content: center; z-index: 100; }
        .logo img { width: 35px; height: 35px; border-radius: 50%; }
        .watermark { text-align: center; padding: 12px; color: #ccc; font-size: 11px; }
    </style>
</head>
<body>
    <div class="container">
        <!-- 第1张 -->
        <div class="card">
            <img src="小南国1.jpg" alt="小南国">
            <div class="card-text">
                <h3>我妈的朋友圈</h3>
                <p>你们看过吗？</p>
            </div>
        </div>
        
        <!-- 第2张 -->
        <div class="card">
            <img src="小南国2.jpg" alt="小南国">
            <div class="card-text">
                <h3>养生文章转发</h3>
                <p>"震惊！这样做可以年轻十岁"<br>🤦‍♀️</p>
            </div>
        </div>
        
        <!-- 第3张 -->
        <div class="card">
            <img src="小南国3.jpg" alt="小南国">
            <div class="card-text">
                <h3>但有一条</h3>
                <p>她每次必转</p>
            </div>
        </div>
        
        <!-- 第4张 -->
        <div class="card">
            <img src="小南国4.jpg" alt="小南国">
            <div class="card-text">
                <h3>"孩子不管多大<br>都是妈妈的心头肉"</h3>
                <p>配图是我的小时候的照片</p>
            </div>
        </div>
        
        <!-- 第5张 -->
        <div class="card">
            <img src="小南国5.jpg" alt="小南国">
            <div class="card-text">
                <h3>原来她每天都在想我</h3>
                <p>只是她不知道怎么说 💕</p>
            </div>
        </div>
        
        <!-- 第6张 -->
        <div class="card">
            <img src="小南国6.jpg" alt="小南国">
            <div class="card-text">
                <h3>📍 母亲节 · 小南国</h3>
                <p>别让朋友圈代替陪伴 🌸<br>388元套餐，带她吃顿好的</p>
            </div>
        </div>
        
        <div class="watermark">👩‍👧 青木会江湖</div>
    </div>
    
    <div class="logo">
        <img src="青木会江湖_logo_108x108.png" alt="logo">
    </div>
</body>
</html>
