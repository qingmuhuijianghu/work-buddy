<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>罗振宇风_时间账本_贴图号</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; background: #1a1a1a; }
        .container { max-width: 414px; margin: 0 auto; background: #1a1a1a; padding-bottom: 30px; }
        .card { position: relative; width: 100%; }
        .card img { width: 100%; display: block; }
        .card-text { position: absolute; bottom: 0; left: 0; right: 0; padding: 30px 20px 25px; background: linear-gradient(transparent, rgba(0,0,0,0.85)); color: white; text-align: center; }
        .card-text h3 { font-size: 20px; font-weight: 700; margin-bottom: 8px; line-height: 1.4; color: #e74c3c; }
        .card-text p { font-size: 15px; opacity: 0.95; line-height: 1.7; }
        .highlight { color: #e74c3c; font-weight: 700; }
        .logo { position: fixed; bottom: 20px; right: 20px; width: 50px; height: 50px; background: white; border-radius: 50%; box-shadow: 0 4px 15px rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: center; z-index: 100; }
        .logo img { width: 40px; height: 40px; border-radius: 50%; }
        .watermark { text-align: center; padding: 15px; color: #666; font-size: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <!-- 第1张 -->
        <div class="card">
            <img src="小南国1.jpg" alt="小南国">
            <div class="card-text">
                <h3>⏱️ 时间账本</h3>
                <p>你还剩几次机会<br>陪妈妈吃饭？</p>
            </div>
        </div>
        
        <!-- 第2张 -->
        <div class="card">
            <img src="小南国2.jpg" alt="小南国">
            <div class="card-text">
                <h3>📊 来算一笔账</h3>
                <p>妈妈55岁<br>按平均寿命80岁计算</p>
            </div>
        </div>
        
        <!-- 第3张 -->
        <div class="card">
            <img src="小南国3.jpg" alt="小南国">
            <div class="card-text">
                <h3>250次</h3>
                <p>25年 × 10次/年<br>= 你还能陪她吃250顿饭</p>
            </div>
        </div>
        
        <!-- 第4张 -->
        <div class="card">
            <img src="小南国4.jpg" alt="小南国">
            <div class="card-text">
                <h3 class="highlight">⚠️ 时间不等人</h3>
                <p>钱可以再赚<br>但和父母吃饭的机会<br>用一次少一次</p>
            </div>
        </div>
        
        <!-- 第5张 -->
        <div class="card">
            <img src="小南国5.jpg" alt="小南国">
            <div class="card-text">
                <h3>📍 小南国</h3>
                <p>388元家庭套餐<br>5月10日 母亲节</p>
            </div>
        </div>
        
        <div class="watermark">⏱️ 青木会江湖</div>
    </div>
    
    <div class="logo">
        <img src="青木会江湖_logo_108x108.png" alt="logo">
    </div>
</body>
</html>
