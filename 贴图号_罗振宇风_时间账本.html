<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贴图号_罗振宇风_时间账本</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }
        .container {
            max-width: 375px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
        }
        .image-area {
            width: 100%;
            height: 500px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 18px;
            text-align: center;
            padding: 40px;
            font-weight: bold;
        }
        .content {
            padding: 20px;
        }
        .title {
            font-size: 20px;
            font-weight: bold;
            color: #333;
            margin-bottom: 15px;
            line-height: 1.4;
        }
        .text {
            font-size: 15px;
            color: #666;
            line-height: 1.8;
            margin-bottom: 20px;
        }
        .tags {
            padding: 0 20px 20px;
        }
        .tag {
            display: inline-block;
            background: #f7f7f7;

<body>
    <div class="container">
        <div class="image-area">
            ⏰ 母亲的时间账本<br>算一算，你还剩多少次见面机会？
        </div>
        
        <div class="content">
            <div class="title">算一笔时间账：你还能陪妈妈多久？</div>
            <div class="text">
                假设妈妈今年55岁，预期寿命85岁。<br><br>
                你每年回家5次，每次待3天。<br><br>
                那么，你还剩：<br>
                <strong>85-55=30年 × 5次 × 3天 = 450天</strong><br><br>
                不到1.5年。<br><br>
                时间最公平，也最残酷。<br>
                这个母亲节，别再说"下次"。💪
            </div>
        </div>
        
        <div class="tags">
            <span class="tag">#母亲节</span>
            <span class="tag">#时间管理</span>
