<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小红书_罗振宇风_时间账本</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
            background: #f8f8f8;
            padding: 20px;
        }
        .container {
            max-width: 375px;
            margin: 0 auto;
            background: white;
            border-radius: 8px;
            overflow: hidden;
        }
        .cover {
            width: 100%;
            height: 500px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 22px;
            font-weight: bold;
            text-align: center;
            padding: 40px;
        }
        .content {
            padding: 20px;
        }
        .title {
            font-size: 22px;
            font-weight: bold;
            color: #333;
            margin-bottom: 15px;
            line-height: 1.4;
        }
        .text {
            font-size: 15px;
            color: #444;
            line-height: 2;
            margin-bottom: 20px;
        }
        .text p {
            margin-bottom: 12px;
        }
        .highlight {
            background: #fff3cd;
            padding: 2px 6px;
            border-radius: 3px;
            font-weight: bold;
        }
        .tags {
            padding: 15px 20px;
            border-top: 1px solid #f0f0f0;
        }
        .tag {
            display: inline-block;
            color: #ff2442;
            font-size: 14px;
            margin-right: 8px;
            margin-bottom: 5px;
        }
        .interaction {
            display: flex;
            justify-content: space-around;
            padding: 15px 20px;
            border-top: 1px solid #f0f0f0;
            color: #999;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="cover">
            ⏰ 罗振宇：时间账本<br>你还能陪妈妈多久？
        </div>
        
        <div class="content">
            <div class="title">算一笔残酷的时间账 📊</div>
            
            <div class="text">
                <p>假设你妈妈55岁，预期寿命85岁。</p>
                
                <p>你每年回家<span class="highlight">5次</span>，每次待<span class="highlight">3天</span>。</p>
                
                <p><strong>那么，你还剩：</strong><br>
                85-55 = <span class="highlight">30年</span><br>
                30年 × 5次 × 3天 = <span class="highlight">450天</span></p>
                
                <p>💡 换句话说：<br>
                你和你妈妈相处的日子，<br>
                <strong>不到1.5年</strong>。</p>
                
                <p>时间最公平，也最残酷。<br>
                这个母亲节，别再说"下次"。<br>
                现在就预订小南国的母亲节套餐，<br>
                把"下次"变成"这次"。💪</p>
            </div>
        </div>
        
        <div class="tags">
            <span class="tag">#母亲节</span>
            <span class="tag">#时间管理</span>
            <span class="tag">#亲情账本</span>
            <span class="tag">#小南国</span>
            <span class="tag">#罗振宇风格</span>
        </div>
        
        <div class="interaction">
            <span>❤️ 2.3k</span>
            <span>💬 456</span>
            <span>⭐ 收藏</span>
            <span>↗️ 分享</span>
        </div>
    </div>
</body>
</html>
